name: Keep Streamlit Awake

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
      timezone: "Asia/Jakarta"

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          curl -L --max-time 60 "https://adioranye.streamlit.app/?keepalive=1"
