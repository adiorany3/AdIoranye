name: Daily Knowledge Base Update

on:
  schedule:
    # 17:05 UTC = 00:05 WIB next day
    - cron: "5 17 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
        type: string
      chat_id:
        description: "Telegram chat id that requested update"
        required: false
        default: ""
        type: string
      requested_at:
        description: "Request time from Telegram"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-kb:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-kb-auto.txt

      - name: Run daily KB scraper
        env:
          POWER_DB_PATH: .adioranye_power.db
          KB_SCRAPER_SOURCES_FILE: kb_sources.json
          KB_SCRAPER_STATE_FILE: .adioranye_kb_scrape_state.json
          KB_SCRAPER_MAX_ITEMS_PER_SOURCE: "0"  # 0 = pakai max_items masing-masing sumber
          KB_SCRAPER_TIMEOUT: "20"
        run: |
          python daily_kb_scraper.py             --db "$POWER_DB_PATH"             --sources "$KB_SCRAPER_SOURCES_FILE"             --state "$KB_SCRAPER_STATE_FILE"             --max-items "$KB_SCRAPER_MAX_ITEMS_PER_SOURCE"

      - name: Commit updated KB database and state
        run: |
          git config user.name "adioranye-kb-bot"
          git config user.email "actions@github.com"
          git add .adioranye_power.db .adioranye_kb_scrape_state.json || true
          if git diff --staged --quiet; then
            echo "No KB changes to commit."
          else
            git commit -m "chore: update daily knowledge base"
            git push
          fi

      - name: Notify Telegram success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_ADMIN_CHAT_ID" ]; then
            echo "Telegram notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_ADMIN_CHAT_ID not configured."
            exit 0
          fi

          MESSAGE="✅ Update Knowledge Base selesai.

          Repo: $GITHUB_REPOSITORY
          Branch: ${GITHUB_REF_NAME}
          Trigger: ${{ github.event.inputs.source || github.event_name }}
          Chat ID: ${{ github.event.inputs.chat_id || '-' }}
          Request: ${{ github.event.inputs.requested_at || '-' }}
          Waktu selesai: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')

          Status: sukses"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"             -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}"             --data-urlencode "text=${MESSAGE}"

      - name: Notify Telegram failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_ADMIN_CHAT_ID" ]; then
            echo "Telegram failure notification skipped: TELEGRAM_BOT_TOKEN or TELEGRAM_ADMIN_CHAT_ID not configured."
            exit 0
          fi

          MESSAGE="❌ Update Knowledge Base gagal.

          Repo: $GITHUB_REPOSITORY
          Branch: ${GITHUB_REF_NAME}
          Trigger: ${{ github.event.inputs.source || github.event_name }}
          Chat ID: ${{ github.event.inputs.chat_id || '-' }}
          Request: ${{ github.event.inputs.requested_at || '-' }}
          Waktu gagal: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')

          Silakan cek log di GitHub Actions."

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"             -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}"             --data-urlencode "text=${MESSAGE}"
