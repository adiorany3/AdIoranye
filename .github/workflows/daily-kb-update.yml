name: Daily Knowledge Base Update

on:
  workflow_dispatch:
  schedule:
    - cron: "10 0 * * *"
      timezone: "Asia/Jakarta"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-knowledge-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily KB scraper
        env:
          SLASHAI_API_KEY: ${{ secrets.SLASHAI_API_KEY }}
          SLASHAI_API_URL: "https://api.slashai.my.id/v1/chat/completions"
        run: |
          python daily_kb_scraper.py \
            --sources kb_sources.json \
            --db .adioranye_power.db \
            --max-items 10

      - name: Commit updated knowledge base
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .adioranye_power.db kb_sources.json || true

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan knowledge base."
          else
            git commit -m "Update knowledge base otomatis"
            git push
          fi

      - name: Notify Telegram success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          MESSAGE="✅ Update Knowledge Base selesai.

          Repo: $GITHUB_REPOSITORY
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Waktu: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')

          Status: sukses"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"

      - name: Notify Telegram failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          MESSAGE="❌ Update Knowledge Base gagal.

          Repo: $GITHUB_REPOSITORY
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Waktu: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')

          Silakan cek log di GitHub Actions."

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
