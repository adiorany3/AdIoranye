name: Daily Knowledge Base Optimized Update
          
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source"
        required: false
        default: "manual"
        type: string
      chat_id:
        description: "Telegram chat id that requested update"
        required: false
        default: ""
        type: string
      requested_at:
        description: "Request time from Telegram"
        required: false
        default: ""
        type: string
      source_limit:
        description: "Jumlah sumber yang diproses pada run ini"
        required: false
        default: "8"
        type: string
      max_items:
        description: "Maksimal item per sumber"
        required: false
        default: "1"
        type: string
      profile:
        description: "Profil update sumber"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "hot"
          - "warm"
          - "cold"
          - "all"
      force:
        description: "Abaikan state URL dan cooldown, lalu coba ingest ulang"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
          
  schedule:
    # 00:17, 06:17, 12:17, 18:17 WIB.
    # Menit 17 dipilih agar tidak menumpuk di awal jam GitHub Actions.
    - cron: "17 17,23,5,11 * * *"
          
permissions:
  contents: write
          
defaults:
  run:
    shell: bash
          
concurrency:
  group: daily-kb-update-${{ github.ref }}
  cancel-in-progress: false
          
jobs:
  update-kb:
    name: Optimized KB Update
    runs-on: ubuntu-latest
    timeout-minutes: 20
          
    env:
      BRANCH_NAME: ${{ github.ref_name }}
      POWER_DB_PATH: .adioranye_power.db
      KB_SCRAPER_SOURCES_FILE: kb_sources.json
      KB_EFFECTIVE_SOURCES_FILE: kb_sources_effective.json
      KB_SOURCE_HEALTH_FILE: .adioranye_kb_source_health.json
      KB_OPTIMIZER_PREPARE_REPORT: kb_runtime_optimizer_prepare.json
      KB_SCRAPER_STATE_FILE: .adioranye_kb_scrape_state.json
      KB_SCRAPER_REPORT_FILE: daily_kb_update_report.json
      DAILY_INTELLIGENCE_BRIEFING_FILE: daily_intelligence_briefing.md
      KB_SCRAPER_TIMEOUT: "8"
      KB_UPDATE_TIME_BUDGET_SECONDS: "480"
      DB_BACKUP_DIR: .db_backups
      DB_BACKUP_MAX_COUNT: "4"
      INPUT_SOURCE: ${{ github.event.inputs.source || github.event_name }}
      INPUT_CHAT_ID: ${{ github.event.inputs.chat_id || '' }}
      INPUT_REQUESTED_AT: ${{ github.event.inputs.requested_at || '' }}
      INPUT_SOURCE_LIMIT: ${{ github.event.inputs.source_limit || vars.KB_UPDATE_SOURCE_LIMIT || '8' }}
      INPUT_MAX_ITEMS: ${{ github.event.inputs.max_items || vars.KB_UPDATE_MAX_ITEMS || '1' }}
      INPUT_PROFILE: ${{ github.event.inputs.profile || vars.KB_UPDATE_PROFILE || 'auto' }}
      INPUT_FORCE: ${{ github.event.inputs.force || 'false' }}
          
    steps:
      - name: Checkout repository without JavaScript actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          
          if [ -z "${BRANCH_NAME:-}" ]; then
            BRANCH_NAME="main"
            echo "BRANCH_NAME=main" >> "$GITHUB_ENV"
          fi
          
          git init .
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "adioranye-kb-bot"
          git config user.email "actions@github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${BRANCH_NAME}"
          git checkout -B "${BRANCH_NAME}" FETCH_HEAD
          
      - name: Validate update limits and profile
        run: |
          set -euo pipefail
          
          SOURCE_LIMIT="${INPUT_SOURCE_LIMIT:-8}"
          MAX_ITEMS="${INPUT_MAX_ITEMS:-1}"
          PROFILE="${INPUT_PROFILE:-auto}"
          
          case "$SOURCE_LIMIT" in
            ''|*[!0-9]*) SOURCE_LIMIT="8" ;;
          esac
          
          case "$MAX_ITEMS" in
            ''|*[!0-9]*) MAX_ITEMS="1" ;;
          esac
          
          case "$PROFILE" in
            auto|hot|warm|cold|all) ;;
            *) PROFILE="auto" ;;
          esac
          
          # Hard cap agar Telegram /update tidak membuat workflow timeout.
          if [ "$SOURCE_LIMIT" -lt 1 ]; then SOURCE_LIMIT="8"; fi
          if [ "$SOURCE_LIMIT" -gt 14 ]; then SOURCE_LIMIT="14"; fi
          if [ "$MAX_ITEMS" -lt 1 ]; then MAX_ITEMS="1"; fi
          if [ "$MAX_ITEMS" -gt 3 ]; then MAX_ITEMS="3"; fi
          
          echo "KB_SCRAPER_SOURCE_LIMIT=$SOURCE_LIMIT" >> "$GITHUB_ENV"
          echo "KB_SCRAPER_MAX_ITEMS_PER_SOURCE=$MAX_ITEMS" >> "$GITHUB_ENV"
          echo "KB_UPDATE_PROFILE=$PROFILE" >> "$GITHUB_ENV"
          
          echo "### Optimized KB update configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${INPUT_SOURCE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${BRANCH_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source limit: ${SOURCE_LIMIT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Max items/source: ${MAX_ITEMS}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile: ${PROFILE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Time budget: ${KB_UPDATE_TIME_BUDGET_SECONDS}s" >> "$GITHUB_STEP_SUMMARY"
          
      - name: Prepare Python environment
        run: |
          set -euo pipefail
          
          python3 --version
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          
          if [ -f requirements-kb-auto.txt ]; then
            pip install -r requirements-kb-auto.txt
          else
            pip install "requests>=2.31"
          fi
          
      - name: Ensure optimizer policy file exists
        run: |
          set -euo pipefail
          . .venv/bin/activate
          
          if [ -f kb_runtime_optimizer.py ]; then
            python kb_runtime_optimizer.py write-policy --output config/adioranye_runtime_policy.json
          else
            echo "::warning::kb_runtime_optimizer.py belum ada. Workflow akan memakai sumber asli tanpa health/cooldown."
          fi
          
      - name: Build effective source list with health cooldown
        run: |
          set -euo pipefail
          . .venv/bin/activate
          
          FORCE_COOLDOWN_FLAG=""
          if [ "${INPUT_FORCE}" = "true" ]; then
            FORCE_COOLDOWN_FLAG="--force-cooldown"
          fi
          
          if [ -f kb_runtime_optimizer.py ]; then
            python kb_runtime_optimizer.py prepare \
              --sources "$KB_SCRAPER_SOURCES_FILE" \
              --health "$KB_SOURCE_HEALTH_FILE" \
              --output "$KB_EFFECTIVE_SOURCES_FILE" \
              --report "$KB_OPTIMIZER_PREPARE_REPORT" \
              --source-limit "$KB_SCRAPER_SOURCE_LIMIT" \
              --max-items "$KB_SCRAPER_MAX_ITEMS_PER_SOURCE" \
              --profile "$KB_UPDATE_PROFILE" \
              $FORCE_COOLDOWN_FLAG
          else
            cp "$KB_SCRAPER_SOURCES_FILE" "$KB_EFFECTIVE_SOURCES_FILE"
          fi
          
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          
          summary = Path(os.environ.get("GITHUB_STEP_SUMMARY", ""))
          report_path = Path(os.environ.get("KB_OPTIMIZER_PREPARE_REPORT", "kb_runtime_optimizer_prepare.json"))
          if not report_path.exists():
              raise SystemExit(0)
          report = json.loads(report_path.read_text(encoding="utf-8"))
          lines = [
              "",
              "### Source optimizer result",
              f"- Profile: {report.get('profile', '-')}",
              f"- Total sources: {report.get('total_sources', '-')}",
              f"- Enabled candidates: {report.get('enabled_candidates', '-')}",
              f"- Selected sources: {report.get('selected_sources', '-')}",
              f"- Skipped by cooldown: {report.get('skipped_cooldown', '-')}",
              f"- Selected tiers: {report.get('tier_counts_selected', {})}",
          ]
          selected = report.get("selected") or []
          if selected:
              lines.append("")
              lines.append("#### Selected source sample")
              for item in selected[:8]:
                  lines.append(f"- {item.get('tier', '-')}: {item.get('name', '-')} / score={item.get('score', '-')}")
          text = "\n".join(lines) + "\n"
          print(text)
          if summary:
              summary.open("a", encoding="utf-8").write(text)
          PY
          
      - name: Run sequential KB scraper
        id: run_scraper
        continue-on-error: true
        run: |
          set +e
          . .venv/bin/activate
          
          FORCE_FLAG=""
          if [ "${INPUT_FORCE}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          
          python daily_kb_scraper.py \
            --db "$POWER_DB_PATH" \
            --sources "$KB_EFFECTIVE_SOURCES_FILE" \
            --state "$KB_SCRAPER_STATE_FILE" \
            --max-items "$KB_SCRAPER_MAX_ITEMS_PER_SOURCE" \
            --timeout "$KB_SCRAPER_TIMEOUT" \
            --time-budget-seconds "$KB_UPDATE_TIME_BUDGET_SECONDS" \
            --source-limit "$KB_SCRAPER_SOURCE_LIMIT" \
            --report-file "$KB_SCRAPER_REPORT_FILE" \
            --briefing-file "$DAILY_INTELLIGENCE_BRIEFING_FILE" \
            --backup-dir "$DB_BACKUP_DIR" \
            --max-backups "$DB_BACKUP_MAX_COUNT" \
            --quiet \
            $FORCE_FLAG
          
          EXIT_CODE=$?
          echo "$EXIT_CODE" > .kb_scraper_exit_code
          echo "scraper_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"
          
      - name: Update source health after scraper
        if: always()
        run: |
          set +e
          . .venv/bin/activate
          
          SCRAPER_EXIT_CODE="0"
          if [ -f .kb_scraper_exit_code ]; then
            SCRAPER_EXIT_CODE="$(cat .kb_scraper_exit_code 2>/dev/null || echo 1)"
          fi
          
          FAILED_FLAG=""
          if [ "$SCRAPER_EXIT_CODE" != "0" ]; then
            FAILED_FLAG="--workflow-failed"
          fi
          
          if [ -f kb_runtime_optimizer.py ]; then
            python kb_runtime_optimizer.py update-health \
              --health "$KB_SOURCE_HEALTH_FILE" \
              --effective-sources "$KB_EFFECTIVE_SOURCES_FILE" \
              --scraper-report "$KB_SCRAPER_REPORT_FILE" \
              $FAILED_FLAG
          fi
          
      - name: Summarize KB report
        if: always()
        run: |
          set +e
          
          if [ ! -f "$KB_SCRAPER_REPORT_FILE" ]; then
            echo "KB report file not found."
            exit 0
          fi
          
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          
          report_path = Path(os.environ.get("KB_SCRAPER_REPORT_FILE", "daily_kb_update_report.json"))
          summary_path = Path(os.environ.get("GITHUB_STEP_SUMMARY", ""))
          
          try:
              report = json.loads(report_path.read_text(encoding="utf-8"))
          except Exception as exc:
              print(f"Failed to read report: {exc}")
              raise SystemExit(0)
          
          items = report.get("items") or []
          added = [item for item in items if item.get("status") == "added"]
          errors = [item for item in items if str(item.get("status", "")).startswith("error")]
          
          lines = [
              "",
              "### Knowledge Base update result",
              f"- Started: {report.get('started_at_wib', '-')}",
              f"- Finished: {report.get('finished_at_wib', '-')}",
              f"- Elapsed: {report.get('elapsed_seconds', '-') } seconds",
              f"- Sources selected: {report.get('sources_selected', '-')}/{report.get('sources_enabled', '-')}",
              f"- Added documents: {report.get('added_documents', 0)}",
              f"- Added chunks: {report.get('added_chunks', 0)}",
              f"- Skipped existing: {report.get('skipped_existing', 0)}",
              f"- Skipped short: {report.get('skipped_short', 0)}",
              f"- Errors: {report.get('errors', 0)}",
              f"- Stopped by time budget: {report.get('stopped_by_time_budget', False)}",
              f"- Next source cursor: {report.get('source_cursor_next', '-')}",
          ]
          
          if added:
              lines.append("")
              lines.append("#### Added items")
              for item in added[:10]:
                  title = str(item.get("title") or "-")[:160]
                  source = str(item.get("source") or "-")[:80]
                  lines.append(f"- {source}: {title}")
          
          if errors:
              lines.append("")
              lines.append("#### Errors")
              for item in errors[:10]:
                  source = str(item.get("source") or "-")[:80]
                  msg = str(item.get("message") or item.get("title") or "-")[:220]
                  lines.append(f"- {source}: {msg}")
          
          text = "\n".join(lines) + "\n"
          print(text)
          
          if summary_path:
              summary_path.open("a", encoding="utf-8").write(text)
          PY
          
      - name: Commit updated KB database, state, health, and reports
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          
          git add \
            "$POWER_DB_PATH" \
            "$KB_SCRAPER_STATE_FILE" \
            "$KB_SOURCE_HEALTH_FILE" \
            "$KB_EFFECTIVE_SOURCES_FILE" \
            "$KB_OPTIMIZER_PREPARE_REPORT" \
            "$DAILY_INTELLIGENCE_BRIEFING_FILE" \
            "$KB_SCRAPER_REPORT_FILE" \
            config/adioranye_runtime_policy.json \
            "$DB_BACKUP_DIR" \
            2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No KB changes to commit."
            exit 0
          fi
          
          git commit -m "chore: optimize knowledge base update"
          
          git fetch --depth=1 origin "${BRANCH_NAME}"
          git rebase FETCH_HEAD || {
            git rebase --abort || true
            echo "::warning::Rebase failed. Trying normal push anyway."
          }
          
          git push origin "HEAD:${BRANCH_NAME}"
          
      - name: Fail job if scraper failed after saving health
        run: |
          set -euo pipefail
          SCRAPER_EXIT_CODE="0"
          if [ -f .kb_scraper_exit_code ]; then
            SCRAPER_EXIT_CODE="$(cat .kb_scraper_exit_code 2>/dev/null || echo 1)"
          fi
          if [ "$SCRAPER_EXIT_CODE" != "0" ]; then
            echo "::error::daily_kb_scraper.py failed with exit code $SCRAPER_EXIT_CODE. Health/report files were saved before failing this job."
            exit "$SCRAPER_EXIT_CODE"
          fi
          
      - name: Notify Telegram success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          set +e
          
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_ADMIN_CHAT_ID:-}" ]; then
            echo "Telegram notification skipped: missing TELEGRAM_BOT_TOKEN or TELEGRAM_ADMIN_CHAT_ID."
            exit 0
          fi
          
          ADDED="0"
          CHUNKS="0"
          ERRORS="0"
          CURSOR="-"
          SELECTED="${KB_SCRAPER_SOURCE_LIMIT}"
          COOLDOWN="-"
          TIERS="-"
          
          if [ -f "$KB_SCRAPER_REPORT_FILE" ]; then
            ADDED="$(python3 -c 'import json,os; d=json.load(open(os.environ["KB_SCRAPER_REPORT_FILE"],encoding="utf-8")); print(d.get("added_documents",0))' 2>/dev/null || echo 0)"
            CHUNKS="$(python3 -c 'import json,os; d=json.load(open(os.environ["KB_SCRAPER_REPORT_FILE"],encoding="utf-8")); print(d.get("added_chunks",0))' 2>/dev/null || echo 0)"
            ERRORS="$(python3 -c 'import json,os; d=json.load(open(os.environ["KB_SCRAPER_REPORT_FILE"],encoding="utf-8")); print(d.get("errors",0))' 2>/dev/null || echo 0)"
            CURSOR="$(python3 -c 'import json,os; d=json.load(open(os.environ["KB_SCRAPER_REPORT_FILE"],encoding="utf-8")); print(d.get("source_cursor_next","-"))' 2>/dev/null || echo '-')"
          fi
          
          if [ -f "$KB_OPTIMIZER_PREPARE_REPORT" ]; then
            SELECTED="$(python3 -c 'import json,os; d=json.load(open(os.environ["KB_OPTIMIZER_PREPARE_REPORT"],encoding="utf-8")); print(d.get("selected_sources","-"))' 2>/dev/null || echo '-')"
            COOLDOWN="$(python3 -c 'import json,os; d=json.load(open(os.environ["KB_OPTIMIZER_PREPARE_REPORT"],encoding="utf-8")); print(d.get("skipped_cooldown","-"))' 2>/dev/null || echo '-')"
            TIERS="$(python3 -c 'import json,os; d=json.load(open(os.environ["KB_OPTIMIZER_PREPARE_REPORT"],encoding="utf-8")); print(d.get("tier_counts_selected",{}))' 2>/dev/null || echo '-')"
          fi
          
          MESSAGE="$(cat <<EOF
          ✅ Update Knowledge Base selesai.
          
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${BRANCH_NAME}
          Trigger: ${INPUT_SOURCE}
          Chat ID: ${INPUT_CHAT_ID:-'-'}
          Request: ${INPUT_REQUESTED_AT:-'-'}
          Profil: ${KB_UPDATE_PROFILE}
          Sumber dipilih: ${SELECTED}
          Cooldown skip: ${COOLDOWN}
          Tier: ${TIERS}
          Item/sumber: ${KB_SCRAPER_MAX_ITEMS_PER_SOURCE}
          Dokumen baru: ${ADDED}
          Chunk baru: ${CHUNKS}
          Error: ${ERRORS}
          Cursor berikutnya: ${CURSOR}
          Waktu selesai: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')
          EOF
          )"
          
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            >/dev/null
          
      - name: Notify Telegram failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          set +e
          
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_ADMIN_CHAT_ID:-}" ]; then
            echo "Telegram failure notification skipped: missing TELEGRAM_BOT_TOKEN or TELEGRAM_ADMIN_CHAT_ID."
            exit 0
          fi
          
          SCRAPER_EXIT_CODE="-"
          if [ -f .kb_scraper_exit_code ]; then
            SCRAPER_EXIT_CODE="$(cat .kb_scraper_exit_code 2>/dev/null || echo '-')"
          fi
          
          MESSAGE="$(cat <<EOF
          ❌ Update Knowledge Base gagal.
          
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${BRANCH_NAME}
          Trigger: ${INPUT_SOURCE}
          Chat ID: ${INPUT_CHAT_ID:-'-'}
          Request: ${INPUT_REQUESTED_AT:-'-'}
          Profil: ${KB_UPDATE_PROFILE}
          Scraper exit: ${SCRAPER_EXIT_CODE}
          Waktu gagal: $(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M:%S WIB')
          Silakan cek log di GitHub Actions.
          EOF
          )"
          
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_ADMIN_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            >/dev/null
